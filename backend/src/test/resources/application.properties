spring.datasource.url=jdbc:h2:mem:product_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
server.servlet.context-path=/api
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
app.jwt.secret=test-secret-key-with-at-least-32-chars
app.jwt.issuer=product-backend-test
app.jwt.expiration-minutes=60
app.seed.user.email=test-user@example.com
app.seed.user.password=test-password
