<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/products" aria-label="Product Inventory home">
      <span class="brand-mark">PI</span>
      <span>
        <strong>Product Inventory</strong>
        <small>Secure catalog operations</small>
      </span>
    </a>

    @if (auth.isAuthenticated()) {
      <nav class="main-nav" aria-label="Primary navigation">
        <a routerLink="/products" routerLinkActive="active">Products</a>
      </nav>

      <button class="logout-button" type="button" (click)="logout()">Sign out</button>
    }
  </header>

  <main>
    <router-outlet />
  </main>
</div>
